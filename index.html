<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>

    <h1>Rock Paper Scissors</h1>
    <p>Open your browser console (F12) to play the game!</p>

    <!-- Player Selection Buttons -->
    <div class="buttons">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </div>

    <!-- DOM Display for Results and Score tracking -->
    <div id="results-container">
        <div id="round-outcome">Click a button above to start the game!</div>
        <div id="score-board" class="score">Player: 0 | Computer: 0</div>
        <div id="final-result" class="final-winner"></div>
    </div>


    <script src="script.js"></script>
    
</body>
</html>
